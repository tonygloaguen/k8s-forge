name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy src

      - name: Security scan
        run: bandit -r src

      - name: Audit dependencies
        run: pip-audit --skip-editable

      - name: Test
        run: pytest -q

      - name: Build package
        run: python -m build

      - name: Check local release install
        run: bash scripts/check_release.sh
