app:
  name: demo-app
  namespace: demo
  image: ghcr.io/example/demo-app:1.0.0
  containerPort: 8000
  replicas: 2

config:
  APP_ENV: "dev"
  LOG_LEVEL: "info"

secrets:
  API_TOKEN: "change-me"

service:
  enabled: true
  port: 80

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "250m"
    memory: "128Mi"

probes:
  liveness: "/healthz"
  readiness: "/readyz"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: false
  host: demo.local
  className: nginx
  path: /
  pathType: Prefix
  tls:
    enabled: false
    secretName: null
  certManager:
    enabled: false
    clusterIssuer: null
  annotations: {}

mesh:
  enabled: false
  provider: linkerd
  inject: false
  annotations:
    linkerd.io/inject: "enabled"

networkPolicy:
  enabled: false
  profile: ingress-only
  ingress:
    enabled: true
    fromNamespaces:
      - ingress-nginx
    ports:
      - 8000
  egress:
    enabled: false

policy:
  enabled: false
  provider: kyverno
  profile: baseline
  validationFailureAction: Audit
  background: true
  rules:
    requireRecommendedLabels: true
    disallowPrivilegedContainers: true
    requireRunAsNonRoot: true
    requireResources: true
    disallowLatestTag: true

supplyChain:
  enabled: false
  image: ""
  scan:
    enabled: true
    tool: trivy
    severity:
      - HIGH
      - CRITICAL
  sbom:
    enabled: true
    tool: syft
    format: cyclonedx-json
  signing:
    enabled: false
    tool: cosign
    keyless: true
