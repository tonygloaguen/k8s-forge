app:
  name: admin-api
  namespace: admin
  image: ghcr.io/example/admin-api:2.1.0
  containerPort: 8080
  replicas: 2

config:
  APP_ENV: "staging"
  LOG_LEVEL: "debug"
  FEATURE_FLAGS: "admin-dashboard"

secrets:
  ADMIN_TOKEN: "change-me"
  SESSION_SECRET: "replace-me"

service:
  enabled: true
  port: 8081

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

probes:
  liveness: "/live"
  readiness: "/ready"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: false
  host: admin.local
  className: nginx
  path: /
  pathType: Prefix
  tls:
    enabled: false
    secretName: null
  certManager:
    enabled: false
    clusterIssuer: null
  annotations: {}

mesh:
  enabled: false
  provider: linkerd
  inject: false
  annotations:
    linkerd.io/inject: "enabled"

networkPolicy:
  enabled: false
  profile: ingress-only
  ingress:
    enabled: true
    fromNamespaces:
      - ingress-nginx
    ports:
      - 8080
  egress:
    enabled: false

policy:
  enabled: false
  provider: kyverno
  profile: baseline
  validationFailureAction: Audit
  background: true
  rules:
    requireRecommendedLabels: true
    disallowPrivilegedContainers: true
    requireRunAsNonRoot: true
    requireResources: true
    disallowLatestTag: true

supplyChain:
  enabled: false
  image: ""
  scan:
    enabled: true
    tool: trivy
    severity:
      - HIGH
      - CRITICAL
  sbom:
    enabled: true
    tool: syft
    format: cyclonedx-json
  signing:
    enabled: false
    tool: cosign
    keyless: true

ci:
  enabled: false
  provider: github-actions
  python:
    enabled: true
    version: "3.12"
    quality:
      ruff: true
      mypy: true
      bandit: true
      pipAudit: true
      pytest: true
      build: true
  container:
    enabled: true
    image: ""
    dockerfile: Dockerfile
    context: .
    scan:
      enabled: true
      tool: trivy
      severity:
        - HIGH
        - CRITICAL
    sbom:
      enabled: true
      tool: syft
      format: cyclonedx-json
  artifacts:
    enabled: true

gitops:
  enabled: false
  provider: argocd
  application:
    name: ""
    namespace: argocd
    project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: ""
  source:
    repoURL: ""
    targetRevision: main
    path: charts-generated/admin-api
    type: helm
  syncPolicy:
    automated: false
    prune: false
    selfHeal: false


observability:
  enabled: false
  provider: prometheus
  metrics:
    enabled: true
    path: /metrics
    portName: http
    interval: 30s
  serviceMonitor:
    enabled: true
    namespace: ""
    labels: {}
  grafana:
    enabled: true
    dashboard:
      enabled: true
      title: ""
  alerts:
    enabled: false

logging:
  enabled: false
  provider: loki
  applicationLogs:
    enabled: true
    source: stdout
  loki:
    namespace: monitoring
    datasourceName: Loki
  collector:
    enabled: true
    type: promtail
  grafana:
    enabled: true
    dashboard:
      enabled: true
      title: ""
  queries:
    enabled: true

tracing:
  enabled: false
  provider: opentelemetry
  backend:
    type: tempo
    namespace: monitoring
    datasourceName: Tempo
  collector:
    enabled: true
    type: opentelemetry-collector
    endpoint: http://otel-collector.monitoring.svc.cluster.local:4318
    protocol: otlp-http
  instrumentation:
    enabled: true
    mode: env
    serviceName: ""
  grafana:
    enabled: true
    dashboard:
      enabled: true
      title: ""
  examples:
    enabled: true

terraform:
  enabled: false
  projectName: ""
  backend:
    type: local
  providers:
    kubernetes:
      enabled: true
    helm:
      enabled: true
    cloud:
      enabled: false
  modules:
    enabled: true
  examples:
    enabled: true

ansible:
  enabled: false
  projectName: ""
  inventory:
    type: local
    hosts:
      - localhost
  playbook:
    name: site.yml
  roles:
    enabled: true
  collections:
    kubernetes:
      enabled: true
    community:
      enabled: false
  examples:
    enabled: true

security:
  enabled: false
  projectName: ""
  container:
    enabled: true
  manifests:
    enabled: true
  rbac:
    enabled: true
  podSecurity:
    enabled: true
  network:
    enabled: true
  secrets:
    enabled: true
  supplyChain:
    enabled: true
  checklist:
    enabled: true
  examples:
    enabled: true

capstone:
  enabled: false
  projectName: ""
  report:
    title: ""
    audience: technical
  checklist:
    enabled: true
  architecture:
    enabled: true
  devsecopsMatrix:
    enabled: true
  modulesSummary:
    enabled: true
  manualSteps:
    enabled: true
  runtimeDependencies:
    enabled: true
  securitySummary:
    enabled: true
  v1Readiness:
    enabled: true
  examples:
    enabled: true
